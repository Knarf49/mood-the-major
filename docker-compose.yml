services:
  mood_server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mood-the-major-backend
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      # override MONGO_URI to point at the "mongo" service name instead of localhost,
      # since containers talk to each other via service name, not localhost
      - MONGO_URI=mongodb://mongo:27017/whiteboard
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: mood-the-major-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  mongo-express:
    image: mongo-express:1.0
    container_name: mood-the-major-mongo-ui
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo         
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin     
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data: